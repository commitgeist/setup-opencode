apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: __APP__
    app.kubernetes.io/instance: __NAMESPACE__-__APP__
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: __REPLICAS__
  selector:
    matchLabels:
      app.kubernetes.io/name: __APP__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __APP__
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: __APP__
          image: __IMAGE__
          ports:
            - name: http
              containerPort: __PORT__
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: __PORT__
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: __PORT__
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: __APP__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: __APP__
spec:
  selector:
    app.kubernetes.io/name: __APP__
  ports:
    - name: http
      port: 80
      targetPort: __PORT__
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: __APP__
  namespace: __NAMESPACE__
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __APP__
